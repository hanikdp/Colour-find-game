<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Whisperer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: white; }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen p-4">

    <div class="w-full max-w-md">
        <div class="flex justify-between items-center py-8">
            <span class="text-gray-500 font-bold tracking-widest text-xs">ROUND 1/5</span>
            <button onclick="resetGame()" class="text-white">🔄</button>
        </div>

        <div id="displayArea" class="w-full h-64 rounded-xl overflow-hidden flex relative">
            <div id="targetBox" class="flex-1 flex items-center justify-center font-black text-2xl shadow-inner"></div>
            <div id="userBox" class="flex-1 flex items-center justify-center font-black text-2xl shadow-inner"></div>
        </div>

        <div id="statusText" class="text-center mt-4 font-bold text-xl h-8"></div>

        <div id="controls" class="mt-8 space-y-6">
            <div>
                <div class="flex justify-between text-xs font-bold text-gray-500 mb-2"><span>HUE</span><span id="hVal">180</span></div>
                <input type="range" id="hSlide" min="0" max="360" value="180" oninput="updateColor()">
            </div>
            <div>
                <div class="flex justify-between text-xs font-bold text-gray-500 mb-2"><span>SATURATION</span><span id="sVal">50</span>%</div>
                <input type="range" id="sSlide" min="0" max="100" value="50" oninput="updateColor()">
            </div>
            <div>
                <div class="flex justify-between text-xs font-bold text-gray-500 mb-2"><span>LIGHTNESS</span><span id="lVal">50</span>%</div>
                <input type="range" id="lSlide" min="0" max="100" value="50" oninput="updateColor()">
            </div>

            <button id="submitBtn" onclick="checkScore()" class="w-full bg-white text-black font-black py-4 rounded-full mt-4 active:scale-95 transition-transform">
                SUBMIT GUESS
            </button>
        </div>

        <div id="resultArea" class="hidden text-center mt-12">
            <h2 class="text-gray-500 font-bold">SCORE</h2>
            <h1 id="finalScore" class="text-7xl font-black my-2">0.00</h1>
            <p id="feedback" class="text-xl mb-8"></p>
            <button onclick="resetGame()" class="border-2 border-white px-8 py-3 rounded-full font-bold">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        let target = { h: 0, s: 0, l: 0 };
        let user = { h: 180, s: 50, l: 50 };
        let isMemorizing = true;

        function resetGame() {
            target = {
                h: Math.floor(Math.random() * 360),
                s: Math.floor(Math.random() * 70) + 20,
                l: Math.floor(Math.random() * 40) + 30
            };
            isMemorizing = true;
            document.getElementById('controls').classList.remove('hidden');
            document.getElementById('resultArea').classList.add('hidden');
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').style.opacity = "0.3";
            
            // Memorize Phase
            document.getElementById('targetBox').style.backgroundColor = `hsl(${target.h}, ${target.s}%, ${target.l}%)`;
            document.getElementById('userBox').style.backgroundColor = `#222`;
            document.getElementById('userBox').innerHTML = "";
            
            let count = 3;
            document.getElementById('statusText').innerText = `MEMORIZE: ${count}s`;
            
            let timer = setInterval(() => {
                count--;
                if(count > 0) {
                    document.getElementById('statusText').innerText = `MEMORIZE: ${count}s`;
                } else {
                    clearInterval(timer);
                    startGuessing();
                }
            }, 1000);
        }

        function startGuessing() {
            isMemorizing = false;
            document.getElementById('statusText').innerText = "";
            document.getElementById('targetBox').style.backgroundColor = "#111";
            document.getElementById('targetBox').innerHTML = "❓";
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('submitBtn').style.opacity = "1";
            updateColor();
        }

        function updateColor() {
            if(isMemorizing) return;
            user.h = document.getElementById('hSlide').value;
            user.s = document.getElementById('sSlide').value;
            user.l = document.getElementById('lSlide').value;
            
            document.getElementById('hVal').innerText = user.h;
            document.getElementById('sVal').innerText = user.s;
            document.getElementById('lVal').innerText = user.l;
            
            document.getElementById('userBox').style.backgroundColor = `hsl(${user.h}, ${user.s}%, ${user.l}%)`;
            document.getElementById('userBox').innerHTML = "YOURS";
        }

        function checkScore() {
            const hDiff = Math.min(Math.abs(target.h - user.h), 360 - Math.abs(target.h - user.h)) / 180;
            const sDiff = Math.abs(target.s - user.s) / 100;
            const lDiff = Math.abs(target.l - user.l) / 100;
            const dist = Math.sqrt(hDiff**2 + sDiff**2 + lDiff**2);
            const score = Math.max(0, 10 - (dist * 5)).toFixed(2);

            document.getElementById('targetBox').style.backgroundColor = `hsl(${target.h}, ${target.s}%, ${target.l}%)`;
            document.getElementById('targetBox').innerHTML = "TARGET";
            document.getElementById('controls').classList.add('hidden');
            document.getElementById('resultArea').classList.remove('hidden');
            document.getElementById('finalScore').innerText = score;
            document.getElementById('feedback').innerText = score > 9 ? "Color Whisperer! 🧠" : "Good effort! 🎨";
        }

        resetGame();
    </script>
</body>
  </html>
